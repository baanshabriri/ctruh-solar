services:
  mongo:
    image: mongo:6
    container_name: solar-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: solar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build: .
    container_name: solar-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - redis
    restart: unless-stopped


volumes:
  mongo_data:
  redis_data: